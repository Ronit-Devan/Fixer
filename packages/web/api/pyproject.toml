[project]
name = "et-api"
version = "0.1.0"
description = "FastAPI server and localhost trace diagnosis UI for ET."
readme = "README.md"
authors = [
    { name = "devan-p", email = "devanapatel@gmail.com" }
]
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.136.1",
    "gpu-doctor-engine",
    "python-multipart>=0.0.28",
    "uvicorn[standard]>=0.47.0",
]

[project.scripts]
et-api = "et_api:main"

[build-system]
requires = ["uv_build>=0.11.13,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=9.0.3",
]

[tool.uv.sources]
gpu-doctor-engine = { path = "../../engine" }
